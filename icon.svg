<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="128" height="128" rx="20" fill="url(#bg)"/>

  <!-- ── Tab 3 (back) ── -->
  <!-- ear -->
  <rect x="10" y="28" width="28" height="12" rx="5" fill="rgba(255,255,255,0.22)"/>
  <!-- body -->
  <rect x="10" y="38" width="90" height="36" rx="6" fill="rgba(255,255,255,0.22)"/>

  <!-- ── Tab 2 (middle) ── -->
  <!-- ear -->
  <rect x="18" y="42" width="28" height="12" rx="5" fill="rgba(255,255,255,0.45)"/>
  <!-- body -->
  <rect x="10" y="52" width="90" height="36" rx="6" fill="rgba(255,255,255,0.45)"/>

  <!-- ── Tab 1 (front / active) ── -->
  <!-- ear -->
  <rect x="10" y="56" width="32" height="14" rx="5" fill="#ffffff"/>
  <!-- body -->
  <rect x="10" y="68" width="90" height="38" rx="6" fill="#ffffff"/>
  <!-- favicon dot -->
  <circle cx="26" cy="87" r="5" fill="#2563eb"/>
  <!-- title line -->
  <rect x="38" y="83" width="38" height="8" rx="4" fill="#2563eb" opacity="0.5"/>

  <!-- ── Sort arrow (right side, vertical bidirectional) ── -->
  <!-- up arrow -->
  <polygon points="114,54  107,67  121,67" fill="white" opacity="0.9"/>
  <!-- shaft -->
  <rect x="111" y="65" width="6" height="20" rx="3" fill="white" opacity="0.9"/>
  <!-- down arrow -->
  <polygon points="114,100 107,87  121,87" fill="white" opacity="0.9"/>
  <!-- shaft -->
  <rect x="111" y="67" width="6" height="20" rx="3" fill="white" opacity="0.9"/>
</svg>
